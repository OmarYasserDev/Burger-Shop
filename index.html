<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Logo.png">

    <title>Belly Delight</title>
</head>

<body>

<div class="login-page">

    <div class="login-image">
    </div>

    <div class="login-container">

        <h1>Welcome to My Website</h1>
        <p>This is a sample webpage created to demonstrate HTML structure and styling.</p>

        <form id="login">

            <div class="input-section">
                <label for="email">Email:</label>
                <input
                    type="text"
                    id="email"
                    class="input-field"
                    placeholder="Enter your email">
            </div>

            <div class="input-section">
                <label for="password">Password:</label>
                <input
                    type="password"
                    id="password"
                    class="input-field"
                    placeholder="Enter your password">
            </div>

            <button type="submit" class="login-button">Login</button>

            <div id="message-box" style="display: none;"></div>

        </form>

        <div class="signup-section">
            <p>Don't have an account?</p>

            <a href="sign-up-page.html">
                <button type="button" class="signup-button">
                    Sign up
                </button>
            </a>
        </div>

    </div>
</div>
<script src="login.js"></script>
</body>
</html>
