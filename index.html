<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-page">
    <div class="login-image">

    </div>
    <div class="login-container">
        <h1>Welcome to My Website</h1>
        <p>This is a sample webpage created to demonstrate HTML structure and styling.</p>
        <form id="login">
        <div class="input-section">
            <label for="email">Email:</label>
            <input type="text" id="email" placeholder="Enter your email" class="input-field">
        </div>
        <div class="input-section">
            <label for="password">Password: </label>
            <input type="password" id="password" placeholder="Enter your password" class="input-field">
        </div>
        </form>
        <button class="login-button">Login</button> 
        <div class="signup-section">
            <p>Don't have an account?
                <a href="sign-up-page.html">
                    <button class="signup-button">Sign up
                    </button>
                </a>
                
            </p>
        </div>
    </div>
</div>   
</body>
</html>
