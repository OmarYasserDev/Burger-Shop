<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="sign-up.css">
</head>
<body>
<div id="message-box"></div>
    <div class="sign-up">
        <h1>🍔 Sign Up Page</h1>
        <p>Create your account and enjoy the best burgers in town.</p>
        <form id="signup-form">
            <div class="input-section">
                <label for="name">Name:</label>
                <input type="text" id="name" placeholder="Enter your name" class="input-field">
            </div>
            <div class="input-section">
                <label for="username">Username:</label>
                <input type="text" id="username" placeholder="Enter your username" class="input-field">
            </div>
            <div class="input-section">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email" class="input-field">
            </div>
            <div class="input-section">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Enter your password" class="input-field">
            </div>
            <div class="input-section">
                <label for="confirm-password">Confirm Password:</label>
                <input type="password" id="confirm-password" placeholder="Confirm your password" class="input-field">
            </div>
            <div class="button-section">
                <button type="submit" class="sign-up-button">
                    Sign Up
                </button>
            </div>
        </form>
        <div class="login-link">
            <p>
                Already have an account?
                <a href="index.html">Login here</a>
            </p>
        </div>
    </div>
    <script src="sign-up.js"></script>
</body>
</html>
