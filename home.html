<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belly delight</title>
    <link rel="stylesheet" href="home.css">
    <link rel="icon" href="Logo.png">
</head>
<body>
    <div class="home-screen">
        <div class="navbar">
            <div class="logo-sec">
                <img src="Logo.png" alt="The logo of our restaurant" class="pic-logo">
            </div>
            <div class="buttons">
                <button class="btn active">Home</button>
                <button class="btn">Menu</button>
                <button class="btn">About</button>
                <button class="btn">Shop</button>
            </div>
            <div class="purchase-cart">
                <input type="text" id="searchBox" placeholder="Search..." >
                <button class="btn2" id="searchBtn"><img src="search.png" alt="" class="search"></button>
                <button class="btn2"><img src="cart.png" alt="" class="cart"></button>
            </div>
        </div>
        <div class="text-sec">
            <h1> THE ULTIMATE <br> BURGER EXPERIENCE </h1>
            <p> Fresh ingredients, juicy patties, and unforgettable flavors. <br>
                Discover the perfect burger experience made just for you.
            </p>
        <div class="btn-sec">
            <button class="btn3">Order Now!</button>
            <button class="btn3">View More</button>
        </div>
        </div>
        <div class="gallery-sec">
            <img src="gallery1.jpg" alt="" class="img-gallery">
            <img src="gallery2.jpg" alt="" class="img-gallery">
            <img src="gallery3.jpg" alt="" class="img-gallery">
            <img src="gallery4.jpg" alt="" class="img-gallery">
        </div>
    </div>
    <script src="home.js"></script>
</body>
</html>
